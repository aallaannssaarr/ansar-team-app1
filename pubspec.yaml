name: ansar_team_app
description: Native mobile app for Al Ansar team operations.
publish_to: "none"
version: 0.3.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.69.0
  supabase_flutter: ^2.8.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  pushy_flutter: 2.0.47
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  flutter_image_compress: ^2.4.0
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#F7FAF8"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/app_icon.png
    - assets/branches/
    - assets/fonts/
