name: Deploy Notification Sender

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/functions/send-notifications/**"
      - ".github/workflows/deploy-notification-function.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Store Firebase service account
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PUSHY_SECRET_API_KEY: ${{ secrets.PUSHY_SECRET_API_KEY }}
        run: |
          supabase secrets set FIREBASE_SERVICE_ACCOUNT_JSON="$FIREBASE_SERVICE_ACCOUNT_JSON" --project-ref dktukfkitlfwpporhjsm
          if [ -n "$PUSHY_SECRET_API_KEY" ]; then
            supabase secrets set PUSHY_SECRET_API_KEY="$PUSHY_SECRET_API_KEY" --project-ref dktukfkitlfwpporhjsm
          fi

      - name: Deploy sender
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy send-notifications --project-ref dktukfkitlfwpporhjsm --no-verify-jwt
