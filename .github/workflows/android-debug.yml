name: Android Stable APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable

      - name: Configure Android environment
        run: |
          printf 'flutter.sdk=%s\n' "$FLUTTER_ROOT" > android/local.properties
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" >> android/local.properties
          chmod +x android/gradlew
          cp google-services.json android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run automated tests
        run: flutter test --reporter expanded

      - name: Build stable release APK
        run: flutter build apk --release --flavor stable

      - name: Build compatibility debug APK
        run: flutter build apk --debug --flavor stable --no-pub

      - name: Prepare APK file
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-stable-release.apk release/ansar-team-stable-release.apk
          cp build/app/outputs/flutter-apk/app-stable-debug.apk release/ansar-team-compatibility-debug.apk

      - name: Distribute APK to Firebase testers
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          npm install --global firebase-tools
          APP_ID=$(python -c "import json; print(json.load(open('google-services.json'))['client'][0]['client_info']['mobilesdk_app_id'])")
          GROUPS=${FIREBASE_TESTER_GROUPS:-ansar-testers}
          RELEASE_NOTES=$(git log -1 --pretty=%s)
          if ! firebase appdistribution:distribute release/ansar-team-stable-release.apk \
              --app "$APP_ID" \
              --groups "$GROUPS" \
              --release-notes "$RELEASE_NOTES"; then
            echo "::warning::Firebase App Distribution was skipped because the service account lacks permission. The GitHub APK is still published normally."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ansar-team-stable-release-apk
          path: release/ansar-team-stable-release.apk

      - name: Upload compatibility APK
        uses: actions/upload-artifact@v4
        with:
          name: ansar-team-compatibility-debug-apk
          path: release/ansar-team-compatibility-debug.apk

      - name: Publish latest stable APK
        uses: ncipollo/release-action@v1
        with:
          tag: stable-latest
          name: Latest stable APK
          body: "Always contains the latest stable release-mode APK built from main."
          artifacts: release/ansar-team-stable-release.apk
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          makeLatest: true
