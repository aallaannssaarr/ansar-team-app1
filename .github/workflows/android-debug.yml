name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable

      - name: Generate Android platform
        run: flutter create --platforms=android .

      - name: Get dependencies
        run: flutter pub get

      - name: Configure Firebase for Android
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          source = Path("google-services.json")
          target = Path("android/app/google-services.json")
          if not source.exists():
              raise SystemExit("google-services.json is missing from the repository root")
          target.parent.mkdir(parents=True, exist_ok=True)
          shutil.copyfile(source, target)

          settings = Path("android/settings.gradle.kts")
          settings_text = settings.read_text(encoding="utf-8")
          google_services_plugin = '    id("com.google.gms.google-services") version "4.4.2" apply false\n'
          if "com.google.gms.google-services" not in settings_text:
              settings_text = settings_text.replace("plugins {\n", "plugins {\n" + google_services_plugin, 1)
              settings.write_text(settings_text, encoding="utf-8")

          app_gradle = Path("android/app/build.gradle.kts")
          app_text = app_gradle.read_text(encoding="utf-8")
          google_services_app_plugin = '    id("com.google.gms.google-services")\n'
          if "com.google.gms.google-services" not in app_text:
              app_text = app_text.replace(
                  '    id("dev.flutter.flutter-gradle-plugin")\n',
                  '    id("dev.flutter.flutter-gradle-plugin")\n' + google_services_app_plugin,
                  1,
              )
              app_gradle.write_text(app_text, encoding="utf-8")

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          manifest_text = manifest.read_text(encoding="utf-8")
          pushy_permissions = [
              "android.permission.INTERNET",
              "android.permission.WAKE_LOCK",
              "android.permission.POST_NOTIFICATIONS",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.RECEIVE_BOOT_COMPLETED",
              "android.permission.SCHEDULE_EXACT_ALARM",
          ]
          declarations = "".join(
              f'    <uses-permission android:name="{name}" />\n'
              for name in pushy_permissions
              if name not in manifest_text
          )
          if declarations:
              manifest_text = manifest_text.replace(">\n    <application", ">\n" + declarations + "    <application", 1)

          pushy_declarations = '''
              <receiver android:name="me.pushy.sdk.flutter.internal.PushyInternalReceiver" android:exported="false">
                  <intent-filter>
                      <action android:name="pushy.me" />
                  </intent-filter>
              </receiver>
              <receiver android:name="me.pushy.sdk.receivers.PushyUpdateReceiver" android:exported="false">
                  <intent-filter>
                      <action android:name="android.intent.action.MY_PACKAGE_REPLACED" />
                  </intent-filter>
              </receiver>
              <receiver android:name="me.pushy.sdk.receivers.PushyBootReceiver" android:exported="false">
                  <intent-filter>
                      <action android:name="android.intent.action.BOOT_COMPLETED" />
                  </intent-filter>
              </receiver>
              <service android:name="me.pushy.sdk.services.PushySocketService" android:stopWithTask="false" />
              <service
                  android:name="me.pushy.sdk.services.PushyJobService"
                  android:permission="android.permission.BIND_JOB_SERVICE"
                  android:stopWithTask="false" />
          '''
          if "me.pushy.sdk.flutter.internal.PushyInternalReceiver" not in manifest_text:
              manifest_text = manifest_text.replace("    </application>", pushy_declarations + "    </application>", 1)
          manifest.write_text(manifest_text, encoding="utf-8")

          proguard = Path("android/app/proguard-rules.pro")
          proguard.write_text(
              "-dontwarn me.pushy.**\n"
              "-keep class me.pushy.** { *; }\n"
              "-keep class androidx.core.app.** { *; }\n"
              "-keep class android.support.v4.app.** { *; }\n",
              encoding="utf-8",
          )
          PY

      - name: Set Android app name and icon
        run: |
          python - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          text = text.replace('android:label="ansar_team_app"', 'android:label="فريق الأنصار"')
          manifest.write_text(text, encoding="utf-8")
          PY
          dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run automated tests
        run: flutter test --reporter expanded

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Prepare APK file
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-debug.apk release/ansar-team-latest-debug.apk

      - name: Distribute APK to Firebase testers
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
        continue-on-error: true
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          npm install --global firebase-tools
          APP_ID=$(python -c "import json; print(json.load(open('google-services.json'))['client'][0]['client_info']['mobilesdk_app_id'])")
          GROUPS=${FIREBASE_TESTER_GROUPS:-ansar-testers}
          RELEASE_NOTES=$(git log -1 --pretty=%s)
          firebase appdistribution:distribute release/ansar-team-latest-debug.apk \
            --app "$APP_ID" \
            --groups "$GROUPS" \
            --release-notes "$RELEASE_NOTES"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ansar-team-debug-apk
          path: release/ansar-team-latest-debug.apk

      - name: Publish latest debug APK
        uses: ncipollo/release-action@v1
        with:
          tag: debug-latest
          name: Latest debug APK
          body: "Always contains the latest debug APK built from main."
          artifacts: release/ansar-team-latest-debug.apk
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          makeLatest: true
